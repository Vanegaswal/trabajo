<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - IntegraJobs</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="register-body">

    <!-- Navbar simplificada -->
    <nav class="navbar navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="index.html">IntegraJobs</a>
            <a href="index.html" class="btn btn-outline-secondary btn-sm">
                <i class="fas fa-arrow-left me-1"></i> Volver al inicio
            </a>
        </div>
    </nav>

    <!-- Register Section -->
    <section class="register-section">
        <div class="container">
            <div class="row justify-content-center align-items-center min-vh-80">
                <div class="col-lg-8 col-md-10">
                    <!-- Type Switch Card -->
                    <div class="type-switch-card text-center mb-4">
                        <div class="btn-group w-50" role="group">
                            <input type="radio" class="btn-check" name="registerType" id="candidatoReg" autocomplete="off" checked>
                            <label class="btn btn-outline-primary rounded-start py-2" for="candidatoReg">
                                <i class="fas fa-user me-1"></i> Candidato
                            </label>
                            
                            <input type="radio" class="btn-check" name="registerType" id="empresaReg" autocomplete="off">
                            <label class="btn btn-outline-primary rounded-end py-2" for="empresaReg">
                                <i class="fas fa-building me-1"></i> Empresa
                            </label>
                        </div>
                    </div>
                    
                    <!-- Register Form Card -->
                    <div class="register-card shadow-lg rounded-4 overflow-hidden">
                        <div class="card-body p-5">
                            <!-- Header -->
                            <div class="text-center mb-4">
                                <h3 class="fw-bold">Cambiar tipo de cuenta</h3>
                                <div class="register-type-title mt-2" id="registerTypeTitle">
                                    <h4 class="h5 text-primary fw-semibold">Crear cuenta de candidato</h4>
                                    <p class="text-muted small">Comienza a explorar miles de oportunidades laborales</p>
                                </div>
                            </div>
                            
                            <!-- Register Form -->
                            <form id="registerForm">
                                <!-- Name Fields Row -->
                                <div class="row g-3 mb-3">
                                    <div class="col-md-6">
                                        <label class="form-label fw-semibold small text-muted">Nombre</label>
                                        <div class="input-group">
                                            <span class="input-group-text bg-light border-end-0">
                                                <i class="fas fa-user text-muted"></i>
                                            </span>
                                            <input type="text" class="form-control border-start-0" 
                                                   placeholder="Ana" id="firstName" required>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-semibold small text-muted">Apellidos</label>
                                        <div class="input-group">
                                            <span class="input-group-text bg-light border-end-0">
                                                <i class="fas fa-user-friends text-muted"></i>
                                            </span>
                                            <input type="text" class="form-control border-start-0" 
                                                   placeholder="García López" id="lastName" required>
                                        </div>
                                    </div>
                                </div>
                                
                                <!-- Email Field -->
                                <div class="mb-3">
                                    <label class="form-label fw-semibold small text-muted">Correo electrónico</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-end-0">
                                            <i class="fas fa-envelope text-muted"></i>
                                        </span>
                                        <input type="email" class="form-control border-start-0" 
                                               placeholder="tu@correo.com" id="email" required>
                                    </div>
                                </div>
                                
                                <!-- Password Field -->
                                <div class="mb-3">
                                    <label class="form-label fw-semibold small text-muted">Contraseña</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-end-0">
                                            <i class="fas fa-lock text-muted"></i>
                                        </span>
                                        <input type="password" class="form-control border-start-0" 
                                               placeholder="Mínimo 8 caracteres" id="password" required>
                                        <button class="btn btn-outline-secondary border-start-0" type="button" id="togglePassword">
                                            <i class="fas fa-eye-slash"></i>
                                        </button>
                                    </div>
                                    <div class="form-text small" id="passwordHelp">
                                        <i class="fas fa-info-circle me-1"></i> La contraseña debe tener al menos 8 caracteres
                                    </div>
                                </div>
                                
                                <!-- Confirm Password Field (for candidato) -->
                                <div class="mb-3" id="confirmPasswordField">
                                    <label class="form-label fw-semibold small text-muted">Confirmar contraseña</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-end-0">
                                            <i class="fas fa-check-circle text-muted"></i>
                                        </span>
                                        <input type="password" class="form-control border-start-0" 
                                               placeholder="Repite tu contraseña" id="confirmPassword">
                                        <button class="btn btn-outline-secondary border-start-0" type="button" id="toggleConfirmPassword">
                                            <i class="fas fa-eye-slash"></i>
                                        </button>
                                    </div>
                                </div>
                                
                                <!-- Company Fields (hidden by default) -->
                                <div id="companyFields" style="display: none;">
                                    <div class="mb-3">
                                        <label class="form-label fw-semibold small text-muted">Nombre de la empresa</label>
                                        <div class="input-group">
                                            <span class="input-group-text bg-light border-end-0">
                                                <i class="fas fa-building text-muted"></i>
                                            </span>
                                            <input type="text" class="form-control border-start-0" 
                                                   placeholder="Nombre de tu empresa" id="companyName">
                                        </div>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label fw-semibold small text-muted">NIT / Registro</label>
                                        <div class="input-group">
                                            <span class="input-group-text bg-light border-end-0">
                                                <i class="fas fa-id-card text-muted"></i>
                                            </span>
                                            <input type="text" class="form-control border-start-0" 
                                                   placeholder="Número de identificación tributaria" id="nit">
                                        </div>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label fw-semibold small text-muted">Sitio web</label>
                                        <div class="input-group">
                                            <span class="input-group-text bg-light border-end-0">
                                                <i class="fas fa-globe text-muted"></i>
                                            </span>
                                            <input type="url" class="form-control border-start-0" 
                                                   placeholder="https://tuempresa.com" id="website">
                                        </div>
                                    </div>
                                </div>
                                
                                <!-- Terms and Conditions -->
                                <div class="form-check mb-4">
                                    <input class="form-check-input" type="checkbox" id="termsCheck" required>
                                    <label class="form-check-label small text-muted" for="termsCheck">
                                        Al registrarte aceptas nuestros <a href="#" class="text-primary text-decoration-none" id="termsLink"><strong>Términos de Servicio y Política de Privacidad</strong></a>.
                                    </label>
                                </div>
                                
                                <!-- Submit Button -->
                                <button type="submit" class="btn btn-primary w-100 py-2 mb-3 fw-semibold" id="submitBtn">
                                    <i class="fas fa-user-plus me-2"></i> Crear mi cuenta
                                </button>
                                
                                <!-- Login Link -->
                                <div class="text-center">
                                    <p class="mb-0 text-muted small">
                                        ¿Ya tienes cuenta? 
                                        <a href="login.html" class="text-primary fw-semibold text-decoration-none">
                                            Iniciar sesión
                                        </a>
                                    </p>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer simplificado -->
    <footer class="bg-light py-4 mt-5">
        <div class="container text-center">
            <p class="text-muted small mb-0">© 2026 IntegraJobs. Todos los derechos reservados. Hecho con ❤️ en El Salvador</p>
        </div>
    </footer>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="../js/register.js"></script>
</body>
</html>
